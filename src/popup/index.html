<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dark Pattern Fixer</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <h1>Dark Pattern Fixer</h1>
      <p id="body-copy"></p>
      <section id="fact-card" class="fact-card hidden">
        <span class="fact-label">Do you know</span>
        <p id="fact-copy"></p>
      </section>
      <button id="reset-button" class="secondary-button" type="button">
        Reset cache
      </button>
      <button id="download-html-button" class="secondary-button" type="button">
        Download HTML debug
      </button>
      <button id="download-screenshot-button" class="secondary-button" type="button" disabled>
        Download raw screenshot
      </button>
      <button id="download-llm-input-button" class="secondary-button" type="button" disabled>
        Download LLM input image
      </button>
      <button id="action-button" type="button"></button>
    </main>
    <script type="module" src="./popup.js"></script>
  </body>
  </html>
